{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AutoBlank{% endblock %}</title>
    <link rel="icon" href="{% static 'img/favicon.ico' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script>
        (function() {
            var theme = localStorage.getItem('theme');
            if (theme === 'light') {
                document.documentElement.classList.add('light-theme');
            }
        })();
    </script>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" title="Переключить тему">
        <span id="themeIcon">&#9790;</span>
    </button>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        (function() {
            var btn = document.getElementById('themeToggle');
            var icon = document.getElementById('themeIcon');
            var html = document.documentElement;

            function updateIcon() {
                icon.innerHTML = html.classList.contains('light-theme') ? '&#9788;' : '&#9790;';
            }

            updateIcon();

            btn.addEventListener('click', function() {
                html.classList.toggle('light-theme');
                var isLight = html.classList.contains('light-theme');
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                updateIcon();
            });
        })();
    </script>
</body>
</html>
