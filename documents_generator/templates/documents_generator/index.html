{% extends 'base.html' %}

{% block title %}Главная{% endblock %}

{% block content %}
    <header>
        <div class="logo">&#128196;</div>
        <h1>Генератор документов</h1>
        <p>Заполните форму для генерации готового документа</p>
    </header>

    <form action="{% url 'gai:generate_document' %}" method="POST" id="contractForm">
        {% csrf_token %}

        <div class="form-container">
            <div class="section">
                <div class="section-header">
                    <span class="icon">&#128205;</span>
                    Тип документа
                </div>
                <div class="section-body">
                    <div class="form-row single">
                        <div class="form-group">
                            <label>Документ</label>
                            <select class="form-control" id="document_kind">
                                <option selected disabled>Договор купли-продажи автомобиля</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <span class="icon">&#128205;</span>
                    Место заключения договора
                </div>
                <div class="section-body">
                    <div class="form-row single">
                        <div class="form-group">
                            <label>Город</label>
                            <input type="text" name="agreement_place" value="Минск">
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <span class="icon">&#128100;</span>
                    Продавец
                </div>
                <div class="section-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Фамилия</label>
                            <input type="text" name="salesman_lastname" value="Иванов">
                        </div>
                        <div class="form-group">
                            <label>Имя</label>
                            <input type="text" name="salesman_firstname" value="Иван">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Отчество</label>
                            <input type="text" name="salesman_patronymic" value="Иванович">
                        </div>
                        <div class="form-group">
                            <label>Идентификационный номер</label>
                            <input type="text" name="salesman_id_number" value="" placeholder="523M3453453453">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Серия и номер паспорта</label>
                            <input type="text" name="salesman_passport_number" value="BY23412312">
                        </div>
                        <div class="form-group">
                            <label>Дата выдачи паспорта</label>
                            <input type="date" name="salesman_passport_issue_date">
                        </div>
                    </div>
                    <div class="form-row single">
                        <div class="form-group">
                            <label>Орган выдачи паспорта</label>
                            <input type="text" name="salesman_passport_issue_place" value="Ленинским РУВД г. Минска">
                        </div>
                    </div>
                    <div class="form-row single">
                        <div class="form-group">
                            <label>Место жительства</label>
                            <input type="text" name="salesman_residence_place" value="г. Минск, ул. Радужная, дом 10, кор. 2, кв. 28">
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <span class="icon">&#128663;</span>
                    Автомобиль
                </div>
                <div class="section-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Тип ТС</label>
                            <input type="text" name="type_car" value="легковой автомобиль" placeholder="легковой автомобиль">
                        </div>
                        <div class="form-group">
                            <label>Марка, модель</label>
                            <input type="text" name="model_car" value="TOYOTA CAMRY" placeholder="TOYOTA CAMRY">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Год выпуска</label>
                            <input type="number" name="year_car" value="2020" placeholder="2020" min="1900" max="2099">
                        </div>
                        <div class="form-group">
                            <label>VIN номер (№ кузова или шасси)</label>
                            <input type="text" name="vin_car" value="ZAR93700003163064" placeholder="XTA210990J5432101" maxlength="17" style="text-transform: uppercase;">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Серия и номер техпаспорта</label>
                            <input type="text" name="reg_cert_number" value="MAA123567" placeholder="6TE 0007756">
                        </div>
                        <div class="form-group">
                            <label>Дата выдачи техпаспорта</label>
                            <input type="date" name="reg_cert_issue_date">
                        </div>
                    </div>
                    <div class="form-row single">
                        <div class="form-group">
                            <label>Наименование органа, выдавшего техпаспорт</label>
                            <input type="text" name="reg_cert_issue_place" value="РЕП ДАИ" placeholder="РЕП ДАИ">
                        </div>
                    </div>
                    <div class="form-row single">
                        <div class="form-group">
                            <label>Стоимость автомобиля</label>
                            <input type="number" name="price" value="" placeholder="15000" min="0" step="0.01">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Срок передачи транспортного средства</label>
                            <input type="date" name="transfer_deadline">
                        </div>
                        <div class="form-group">
                            <label>Срок приёмки транспортного средства</label>
                            <input type="date" name="acceptance_deadline">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Способ оплаты</label>
                            <select class="form-control" name="payment_method">
                                <option value="наличные" selected>Наличные</option>
                                <option value="безналичный расчёт">Безналичный расчёт</option>
                                <option value="банковский перевод">Банковский перевод</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Дата оплаты</label>
                            <input type="date" name="payment_date">
                        </div>
                    </div>
                </div>
            </div>

            <div class="section">
                <div class="section-header">
                    <span class="icon">&#128100;</span>
                    Покупатель
                </div>
                <div class="section-body">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Фамилия</label>
                            <input type="text" name="buyer_lastname" value="Петров">
                        </div>
                        <div class="form-group">
                            <label>Имя</label>
                            <input type="text" name="buyer_firstname" value="Петр">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Отчество</label>
                            <input type="text" name="buyer_patronymic" value="Петрович">
                        </div>
                        <div class="form-group">
                            <label>Идентификационный номер</label>
                            <input type="text" name="buyer_id_number" value="" placeholder="523M3453453453">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Серия и номер паспорта</label>
                            <input type="text" name="buyer_passport_number" value="BY23412312">
                        </div>
                        <div class="form-group">
                            <label>Дата выдачи паспорта</label>
                            <input type="date" name="buyer_passport_issue_date">
                        </div>
                    </div>
                    <div class="form-row single">
                        <div class="form-group">
                            <label>Орган выдачи паспорта</label>
                            <input type="text" name="buyer_passport_issue_place" value="Ленинским РУВД г. Минска">
                        </div>
                    </div>
                    <div class="form-row single">
                        <div class="form-group">
                            <label>Место жительства</label>
                            <input type="text" name="buyer_residence_place" value="г. Минск, ул. Радужная, дом 10, кор. 2, кв. 28">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="btn-group">
            <button type="button" class="btn btn-danger" onclick="document.getElementById('contractForm').reset();">
                &#128465; Очистить
            </button>
            <button type="submit" class="btn btn-primary">
                &#128196; Сформировать документ
            </button>
        </div>
    </form>
{% endblock %}
